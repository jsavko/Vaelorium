<!-- Source vector for the Vaelorium app icon.
     Generate platform-specific icons from this with:
       npx @tauri-apps/cli icon src-tauri/icons/source.svg
     This writes 32x32.png, 128x128.png, 128x128@2x.png, icon.icns, icon.ico
     into src-tauri/icons/ at the sizes Tauri expects.
     Re-run after any logo change. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- walnut backdrop with rounded corners -->
  <rect width="1024" height="1024" rx="224" fill="#2C2520"/>
  <!-- ornamental inner border -->
  <rect x="80" y="80" width="864" height="864" rx="176" fill="none" stroke="#C8A55C" stroke-width="6" opacity="0.4"/>
  <!-- serif V: two tapered strokes meeting at a point -->
  <g fill="#C8A55C">
    <!-- left stroke -->
    <path d="M 224 224 L 352 224 L 384 256 L 352 288 L 344 288 L 512 704 L 480 752 L 448 752 L 232 280 L 216 264 Z"/>
    <!-- right stroke -->
    <path d="M 800 224 L 672 224 L 640 256 L 672 288 L 680 288 L 512 704 L 544 752 L 576 752 L 792 280 L 808 264 Z"/>
  </g>
  <!-- four-pointed star, brighter gold for hierarchy -->
  <path d="M 512 480 L 534 568 L 608 576 L 534 584 L 512 672 L 490 584 L 416 576 L 490 568 Z"
        fill="#DABB6E"/>
</svg>
