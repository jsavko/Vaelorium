name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  version-guard:
    name: Version Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify manifest versions agree (and match tag on tag push)
        env:
          GITHUB_REF_NAME: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: node scripts/check-versions.mjs

  test:
    name: Unit Tests
    needs: version-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build (${{ matrix.platform }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vaelorium-${{ matrix.platform }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          if-no-files-found: ignore

  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate latest.json (updater manifest)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Tauri v2 signs raw installers directly (no .zip/.tar.gz intermediates
          # for Win/Linux). Match the actual artifact names the build produces.
          WIN_SIG=$(find artifacts -name "*.msi.sig" | head -1)
          [ -z "$WIN_SIG" ] && WIN_SIG=$(find artifacts -name "*-setup.exe.sig" | head -1)
          MAC_ARM_SIG=$(find artifacts/vaelorium-macos-arm -name "*.app.tar.gz.sig" 2>/dev/null | head -1)
          LINUX_SIG=$(find artifacts -name "*.AppImage.sig" | head -1)

          read_sig() { [ -f "$1" ] && cat "$1" || echo ""; }
          find_url() {
            local pattern="$1"
            local file=$(find artifacts -name "$pattern" | head -1)
            [ -z "$file" ] && { echo ""; return; }
            local name=$(basename "$file")
            echo "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/${name}"
          }

          WIN_URL=$(find_url "*.msi")
          [ -z "$WIN_URL" ] && WIN_URL=$(find_url "*-setup.exe")
          MAC_URL=$(find_url "*.app.tar.gz")
          LINUX_URL=$(find_url "*.AppImage")

          cat > latest.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "See release notes at https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "windows-x86_64": {
                "signature": "$(read_sig "$WIN_SIG")",
                "url": "${WIN_URL}"
              },
              "darwin-aarch64": {
                "signature": "$(read_sig "$MAC_ARM_SIG")",
                "url": "${MAC_URL}"
              },
              "linux-x86_64": {
                "signature": "$(read_sig "$LINUX_SIG")",
                "url": "${LINUX_URL}"
              }
            }
          }
          EOF
          cat latest.json

      # Releases are created as drafts. You explicitly promote to a full
      # release (which is what the updater sees) by running:
      #   gh release edit v<version> --draft=false --repo <owner>/<repo>
      # or via the GitHub UI ("Publish release"). This lets you QA builds
      # before users' auto-updater picks them up.
      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            artifacts/**/*
            latest.json
